services:
  # One-off: applies migrations then exits. The app waits for it to succeed,
  # so `docker compose up` always starts against an up-to-date schema — the
  # reviewer never runs alembic by hand. (Seed will hang off the same pattern
  # in step 3.)
  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://primmo:primmo@postgres:5432/primmo
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build: .
    command: ["python", "scripts/seed.py"]
    environment:
      DATABASE_URL: postgresql+psycopg://primmo:primmo@postgres:5432/primmo
      PYTHONPATH: /app
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - blob_data:/data/blobs
    environment:
      # Non-superuser role so Postgres RLS actually applies (superusers/owners bypass it).
      DATABASE_URL: postgresql+psycopg://primmo_app:primmo_app@postgres:5432/primmo
      JWT_SECRET: dev-secret-change-me
      DEV_MODE: "true"
      PARTNER_HMAC_SECRET: dev-partner-secret-change-me
      REDIS_URL: redis://redis:6379/0
      BLOB_STORAGE_DIR: /data/blobs
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["celery", "-A", "src.celery_app", "worker", "--loglevel=info"]
    volumes:
      - .:/app
      - blob_data:/data/blobs
    environment:
      # Non-superuser role so Postgres RLS actually applies (superusers/owners bypass it).
      DATABASE_URL: postgresql+psycopg://primmo_app:primmo_app@postgres:5432/primmo
      JWT_SECRET: dev-secret-change-me
      DEV_MODE: "true"
      PARTNER_HMAC_SECRET: dev-partner-secret-change-me
      REDIS_URL: redis://redis:6379/0
      BLOB_STORAGE_DIR: /data/blobs
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: primmo
      POSTGRES_PASSWORD: primmo
      POSTGRES_DB: primmo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primmo -d primmo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  blob_data:
