[pytest]
markers =
    integration: needs Docker — spins real Postgres/Redis via testcontainers
# Fast unit suite by default; run the integration suite explicitly with
# `pytest -m integration` (or `pytest tests/integration -m integration`).
addopts = -m "not integration"
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio.*
